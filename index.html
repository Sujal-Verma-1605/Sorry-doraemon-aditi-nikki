<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic Website</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
<div class="theme-toggle">🌙</div>
<div id="hearts"></div>

<div class="phone">
<div class="page active">
<h1 id="typing"></h1>
<p>A special message for someone important ❤️</p>
<div class="gift-box">🎁</div>
<div id="giftMessage">A Special Hug For You ❤️</div>
<button class="next">Next</button>
</div>

<div class="page">
<h2>Gallery</h2>
<div class="gallery">
<img class="slide active" src="https://picsum.photos/400/300?1">
<img class="slide" src="https://picsum.photos/400/300?2">
<img class="slide" src="https://picsum.photos/400/300?3">
</div>
<div class="buttons">
<button class="back">Back</button>
<button class="next">Next</button>
</div>
</div>

<div class="page">
<h2>Will You Forgive Me? 🥺</h2>
<button id="forgiveBtn">Yes ❤️</button>
<div class="buttons">
<button class="back">Back</button>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
